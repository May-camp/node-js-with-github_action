name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - run: docker build -t mayyadanarmaung/next-js-app:latest ./next-js-app
    - run: docker push mayyadanarmaung/next-js-app:latest
    
  